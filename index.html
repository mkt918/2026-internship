<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年インターンシップ</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Meiryo','Hiragino Sans',sans-serif;
    background:#f4f6fa;
    color:#222;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
  }
  header{
    text-align:center;
    margin-bottom:40px;
  }
  header h1{
    font-size:1.8rem;
    color:#1a3a5c;
    margin-bottom:6px;
  }
  header p{
    color:#667;
    font-size:0.95rem;
  }
  main{
    width:100%;
    max-width:720px;
  }
  .card-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .card{
    background:#fff;
    border-radius:10px;
    padding:20px 22px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    color:inherit;
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .card:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(0,0,0,0.1);
  }
  .card .icon{
    font-size:1.8rem;
    flex-shrink:0;
  }
  .card .text h2{
    font-size:1.05rem;
    color:#1a3a5c;
    margin-bottom:4px;
  }
  .card .text p{
    font-size:0.85rem;
    color:#888;
  }
  .placeholder{
    text-align:center;
    color:#aaa;
    font-size:0.85rem;
    margin-top:30px;
    padding:20px;
    border:1px dashed #ccc;
    border-radius:10px;
  }
  footer{
    margin-top:auto;
    padding-top:40px;
    font-size:0.75rem;
    color:#aaa;
  }
</style>
</head>
<body>

<header>
  <h1>📋 2026年インターンシップ</h1>
  <p>インターンシップ関連の各種資料・ツールをまとめたページです</p>
</header>

<main>
  <div class="card-list">
    <!-- ここに各コンテンツへのリンクカードを追加していく -->
  </div>

  <div class="placeholder">
    コンテンツは準備中です。追加が必要な資料があれば教えてください。
  </div>
</main>

<footer>
  江南高校 インターンシップ管理
</footer>

</body>
</html>
